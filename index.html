<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosko de Encuesta</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      text-align: center;
    }
    /* Estilos para los contenedores (Screens) */
    .screen {
      display: none; /* Oculto por defecto */
      flex-direction: column;
      align-items: center;
    }
    #qrcode {
      margin: 20px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      min-height: 250px;
      min-width: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 10px;
      width: 250px;
    }
    button:hover {
      background-color: #004494;
    }
    .titulo {
      color: #333;
      margin-bottom: 5px;
    }
    .subtitulo {
      color: #666;
      margin-bottom: 30px;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <div id="pantalla-inicio" class="screen">
    <h1 class="titulo">¡Bienvenido a la encuesta!</h1>
    <h2 class="subtitulo">Selecciona tu entidad</h2>
    
    <button onclick="seleccionarEntidad('Kiosk_A')">Caritas</button>
    <button onclick="seleccionarEntidad('Kiosk_B')">Cruz Roja</button>
    <button onclick="seleccionarEntidad('Kiosk_C')">Entidad C</button>
  </div>

  <div id="pantalla-qr" class="screen">
    <h1 class="titulo">¡Escanea para participar!</h1>
    <div id="qrcode">Cargando...</div>
    <button onclick="fetchNewLink()">Generar Nuevo Código QR</button>
  </div>

  <script>
    // 1. Mirar si la URL ya tiene una entidad seleccionada
    const urlParams = new URLSearchParams(window.location.search);
    const kioskName = urlParams.get('kiosk');

    // 2. PEGA TU URL DE GOOGLE APPS SCRIPT AQUÍ
    const BASE_API_URL = "https://script.google.com/macros/s/AKfycbwkCg42Jho56iU8vhLGrr1nCkLOUPGEtyE0mFnf9TTugumTajhgigce2gHyOohoVZLEIA/exec"; 
    
    let qrCodeInstance = null;

    // Lógica para decidir qué pantalla mostrar al cargar
    if (!kioskName) {
      // Si no hay kiosko en la URL, mostrar el menú
      document.getElementById("pantalla-inicio").style.display = "flex";
    } else {
      // Si ya hay kiosko, mostrar la pantalla del QR y buscar el link
      document.getElementById("pantalla-qr").style.display = "flex";
      fetchNewLink();
    }

    // Función que se activa al pulsar un botón de entidad
    function seleccionarEntidad(nombreEntidad) {
      // Recarga la página añadiendo el kiosko a la URL
      window.location.href = "?kiosk=" + nombreEntidad;
    }

    // Función para buscar el link en Google Sheets
    async function fetchNewLink() {
      const qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML = "Buscando enlace para " + kioskName + "...";
      
      const API_URL = BASE_API_URL + "?kiosk=" + kioskName;

      try {
        let response = await fetch(API_URL);
        let data = await response.json();

        if (data.status === "success") {
          qrContainer.innerHTML = ""; // Limpiar el texto
          qrCodeInstance = new QRCode(qrContainer, {
            text: data.link,
            width: 250,
            height: 250
          });
        } else {
          qrContainer.innerHTML = "<h3>" + data.message + "</h3>"; 
        }
      } catch (error) {
        qrContainer.innerHTML = "<h3>Error al cargar. Por favor, intenta de nuevo.</h3>";
        console.error("Error:", error);
      }
    }
  </script>

</body>
</html>
